<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Metis Predictions</title>
  <style>
    :root { color-scheme: light; --ink:#18202a; --muted:#687282; --line:#d9dee5; --bg:#f6f7f9; --panel:#fff; --accent:#126c5b; --red:#a33d3d; --amber:#9a6a12; --blue:#2f5f95; }
    body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif; background:var(--bg); color:var(--ink); }
    header { background:#101820; color:white; padding:22px 28px 18px; }
    h1 { margin:0 0 6px; font-size:26px; letter-spacing:0; }
    .subtitle { color:#c8d2df; font-size:14px; }
    nav { display:flex; gap:10px; flex-wrap:wrap; padding:12px 28px; background:#162331; border-top:1px solid #243346; }
    nav a { color:#dce6f2; text-decoration:none; padding:7px 10px; border-radius:6px; font-size:14px; }
    nav a.active, nav a:hover { background:#24364a; color:white; }
    main { padding:22px 28px 48px; display:grid; gap:20px; }
    section, .panel { background:var(--panel); border:1px solid var(--line); border-radius:8px; padding:16px; overflow-x:auto; }
    h2 { margin:0 0 12px; font-size:19px; }
    h3 { margin:0 0 8px; font-size:16px; }
    p, li { line-height:1.55; }
    .muted { color:var(--muted); }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:16px; }
    .hero { display:grid; grid-template-columns:minmax(320px,1.4fr) minmax(280px,.8fr); gap:18px; align-items:stretch; }
    .lead { font-size:17px; line-height:1.55; max-width:900px; margin:0; }
    .metric-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:10px; }
    .metric { border:1px solid #e3e7ec; border-radius:8px; padding:12px; background:#fbfcfd; }
    .metric-label { color:var(--muted); font-size:12px; text-transform:uppercase; letter-spacing:.03em; }
    .metric-value { font-size:24px; font-weight:700; margin-top:4px; }
    .metric-note { color:var(--muted); font-size:12px; margin-top:4px; }
    .insight-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(280px,1fr)); gap:12px; }
    .insight { border-left:4px solid var(--accent); border-radius:8px; background:#fbfcfd; padding:13px 14px; border-top:1px solid #e5e9ee; border-right:1px solid #e5e9ee; border-bottom:1px solid #e5e9ee; }
    .insight.warning { border-left-color:var(--amber); }
    .insight.negative { border-left-color:var(--red); }
    .insight.blue { border-left-color:var(--blue); }
    .insight p { margin:0; }
    .anomaly-list { list-style:none; padding:0; margin:0; display:grid; gap:8px; }
    .anomaly-list li { display:grid; grid-template-columns:70px 70px 1fr; gap:10px; align-items:baseline; border-bottom:1px solid #edf0f4; padding-bottom:8px; }
    .ticker { font-weight:700; }
    .move { font-variant-numeric:tabular-nums; font-weight:700; }
    .move.up { color:var(--accent); }
    .move.down { color:var(--red); }
    .appendix { display:grid; grid-template-columns:repeat(auto-fit,minmax(190px,1fr)); gap:10px; }
    .appendix-link { display:grid; gap:4px; border:1px solid #e0e5ea; border-radius:8px; padding:12px; text-decoration:none; background:#fbfcfd; }
    .appendix-link span { color:var(--muted); font-size:12px; }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th,td { padding:8px 10px; border-bottom:1px solid #e8ebef; text-align:left; vertical-align:top; }
    th { background:#f0f3f6; font-weight:650; }
    code { background:#eef2f5; border:1px solid #dde4ea; border-radius:4px; padding:1px 4px; }
    a { color:var(--accent); }
    @media (max-width:760px) { .hero { grid-template-columns:1fr; } .anomaly-list li { grid-template-columns:62px 68px 1fr; } }
  </style>
</head>
